<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結帳 — 橙築選物</title>
  <link rel="preconnect" href="https://images.weserv.nl">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* === STEPPER === */
    .stepper {
      background: #fff;
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
      gap: 16px;
    }
    .step {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-muted);
      font-size: 13px; font-weight: 600;
    }
    .step .num {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--bg-soft);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
      color: var(--text-faint);
    }
    .step.done { color: var(--green); }
    .step.done .num { background: var(--green); color: #fff; }
    .step.active { color: var(--pink); }
    .step.active .num { background: var(--pink); color: #fff; }
    .step-line {
      width: 60px; height: 2px;
      background: var(--border);
    }
    .step-line.done { background: var(--green); }

    /* === LAYOUT === */
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 16px;
      align-items: start;
    }

    /* === FORM SECTIONS === */
    .form-section {
      background: #fff;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .form-section h3 {
      padding: 14px 16px;
      font-size: 15px; font-weight: 800;
      color: var(--dark);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .form-section h3 .num {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--pink); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 900;
    }
    .form-body { padding: 16px; }

    .form-row {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 12px;
      margin-bottom: 14px;
      align-items: start;
    }
    .form-row.full {
      grid-template-columns: 1fr;
    }
    .form-row .label {
      font-size: 13px; color: var(--text);
      font-weight: 600;
      padding-top: 9px;
    }
    .form-row .label .req { color: var(--red); margin-left: 2px; }
    .form-row .field { min-width: 0; }
    .form-row input[type="text"],
    .form-row input[type="email"],
    .form-row input[type="tel"],
    .form-row select,
    .form-row textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: border-color .15s;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
      outline: none;
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(214,0,107,0.08);
    }
    .form-row .hint {
      font-size: 11px; color: var(--text-muted);
      margin-top: 4px;
    }
    .form-row .err {
      font-size: 12px; color: var(--red);
      margin-top: 4px;
      display: none;
    }
    .form-row.has-error input,
    .form-row.has-error select {
      border-color: var(--red);
    }
    .form-row.has-error .err { display: block; }

    .addr-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    /* === RADIO CARDS === */
    .radio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .radio-card {
      position: relative;
      border: 1px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
      transition: all .15s;
      border-radius: 4px;
    }
    .radio-card input { position: absolute; opacity: 0; }
    .radio-card .name {
      font-size: 14px; font-weight: 700;
      margin-bottom: 4px;
    }
    .radio-card .desc {
      font-size: 11px; color: var(--text-muted);
    }
    .radio-card:hover { border-color: var(--pink); }
    .radio-card.checked {
      border-color: var(--pink);
      background: var(--pink-tint);
      box-shadow: 0 0 0 1px var(--pink);
    }
    .radio-card .check {
      position: absolute; top: 8px; right: 8px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--pink); color: #fff;
      display: none; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .radio-card.checked .check { display: flex; }

    /* === CARD INPUT === */
    .card-fields {
      display: none;
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-soft);
      border-radius: 4px;
      border: 1px dashed var(--border);
    }
    .card-fields.open { display: block; }
    .card-fields .row {
      display: grid;
      grid-template-columns: 1fr 100px 100px;
      gap: 12px;
      margin-bottom: 8px;
    }
    .card-fields .row:last-child { margin-bottom: 0; }
    .card-fields .row > div { display: flex; flex-direction: column; gap: 4px; }
    .card-fields .row label {
      font-size: 11px; color: var(--text-muted);
      font-weight: 600;
    }
    .card-fields input {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      letter-spacing: 1px;
    }
    .card-fields input:focus {
      outline: none; border-color: var(--pink);
    }
    .card-mock-note {
      margin-top: 12px;
      font-size: 11px;
      color: var(--text-muted);
      padding: 8px 10px;
      background: var(--yellow-soft);
      border-left: 2px solid var(--yellow);
      border-radius: 3px;
    }

    /* === SUMMARY === */
    .co-summary {
      background: #fff;
      border: 1px solid var(--border);
      position: sticky;
      top: 80px;
    }
    .co-summary h3 {
      padding: 14px 16px;
      font-size: 14px; font-weight: 800;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between;
      align-items: baseline;
    }
    .co-summary h3 .count {
      font-size: 12px; color: var(--text-muted);
      font-weight: 600;
    }
    .co-items {
      max-height: 320px; overflow-y: auto;
      padding: 8px 16px;
    }
    .co-item {
      display: grid;
      grid-template-columns: 56px 1fr auto;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-soft);
      align-items: center;
    }
    .co-item:last-child { border-bottom: none; }
    .co-item .img {
      width: 56px; height: 56px;
      background: #fafafa;
      display: flex; align-items: center; justify-content: center;
    }
    .co-item .img img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; padding: 4px;
    }
    .co-item .meta { min-width: 0; }
    .co-item .meta .name {
      font-size: 12px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .co-item .meta .qty {
      font-size: 11px; color: var(--text-muted);
      margin-top: 2px;
    }
    .co-item .price {
      font-size: 13px; font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .co-rows {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .co-row {
      display: flex; justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .co-row .v {
      color: var(--text); font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .co-row.discount .v { color: var(--green); }
    .co-total {
      display: flex; justify-content: space-between;
      align-items: baseline;
      padding: 12px 0 0;
      margin-top: 8px;
      border-top: 1px solid var(--border);
    }
    .co-total .label {
      font-size: 14px; font-weight: 700;
    }
    .co-total .v {
      font-size: 24px; font-weight: 900;
      color: var(--red);
      font-variant-numeric: tabular-nums;
    }
    .co-total .v small { font-size: 13px; font-weight: 700; }
    .co-confirm {
      display: block; width: 100%;
      padding: 16px;
      background: var(--pink); color: #fff;
      font-size: 16px; font-weight: 800;
      text-align: center;
      transition: background .15s;
      cursor: pointer;
      border: none;
    }
    .co-confirm:hover { background: var(--pink-dark); }
    .co-confirm:disabled { background: #ccc; cursor: not-allowed; }
    .co-note {
      padding: 12px 16px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--yellow-soft);
      border-top: 1px solid var(--border);
      line-height: 1.7;
    }

    @media (max-width: 950px) {
      .checkout-layout { grid-template-columns: 1fr; }
      .co-summary { position: static; }
      .radio-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; gap: 6px; }
      .form-row .label { padding-top: 0; }
      .addr-row { grid-template-columns: 1fr; }
      .radio-grid { grid-template-columns: 1fr; }
      .card-fields .row { grid-template-columns: 1fr; }
      .stepper { gap: 8px; padding: 12px 8px; }
      .step-line { width: 24px; }
      .step span:not(.num) { display: none; }
    }
  </style>
</head>
<body>

<div class="demo-banner">

  橙築 LINE 整合電商示範站

      <button type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>

</header>

<main>

</main>

<footer>

<script>
const checkoutContent = document.getElementById('checkoutContent');

// 取得「已勾選」要結帳的商品
const selectedSet = (() => {
  try { return new Set(JSON.parse(localStorage.getItem('chengzhu_shop_select_v1') || '[]')); }
  catch { return new Set(); }
})();

const allItems = cartStore.itemsWithProduct();
const items = allItems.filter(it => selectedSet.has(it.id));

if (items.length === 0) {
  checkoutContent.innerHTML = `
    <div style="background:#fff;border:1px solid var(--border);padding:60px 24px;text-align:center">
      <div style="font-size:48px;margin-bottom:10px">🛒</div>
      <h3 style="font-size:18px;margin-bottom:8px">沒有要結帳的商品</h3>
      <p style="color:var(--text-muted);margin-bottom:16px">請先到購物車選擇商品。</p>
      <a class="btn btn-primary" href="cart.html">回購物車</a>
    </div>`;
} else {
  renderForm();
}

function calcShipping(subtotal, method) {
  if (method === 'cvs') return 60;
  if (method === 'home') return subtotal >= 499 ? 0 : 80;
  return 0;
}
function calcDiscount(subtotal) {
  return subtotal >= 1000 ? 100 : 0;
}

function renderForm() {
  const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);

  checkoutContent.innerHTML = `
    <form id="coForm" class="checkout-layout" novalidate>
      <div>
        <!-- Section 1: 收件資訊 -->
        <section class="form-section">
          <h3><span class="num">1</span>收件資訊</h3>
          <div class="form-body">
            <div class="form-row">
              <div class="label">收件人<span class="req">*</span></div>
              <div class="field">
                <input type="text" name="name" id="fName" placeholder="例:王小明" autocomplete="name">
                <div class="err" data-for="fName">請填寫收件人姓名</div>
              </div>
            </div>

              <div class="label">手機號碼<span class="req">*</span></div>

                <div class="err" data-for="fPhone">請填寫正確的手機號碼</div>
              </div>
            </div>

              <div class="label">Email</div>
              <div class="field">
                <input type="email" name="email" id="fEmail" placeholder="example@chengzhu.co" autocomplete="email">
                <div class="hint">用於寄送訂單確認與發票</div>
              </div>
            </div>
            <div class="form-row">
              <div class="label">配送地址<span class="req">*</span></div>
              <div class="field">
                <div class="addr-row">
                  <select name="city" id="fCity">
                    <option value="">縣市</option>
                    <option>台北市</option><option>新北市</option><option>桃園市</option>
                    <option>台中市</option><option>台南市</option><option>高雄市</option>
                    <option>基隆市</option><option>新竹市</option><option>嘉義市</option>
                    <option>新竹縣</option><option>苗栗縣</option><option>彰化縣</option>
                    <option>南投縣</option><option>雲林縣</option><option>嘉義縣</option>
                    <option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
                    <option>台東縣</option><option>澎湖縣</option>
                  </select>
                  <select name="dist" id="fDist">
                    <option value="">區/鄉鎮</option>
                    <option>請先選擇縣市</option>
                  </select>
                </div>
                <input type="text" name="addr" id="fAddr" placeholder="街道、巷弄、號樓" autocomplete="street-address">
                <div class="err" data-for="fAddr">請完整填寫配送地址</div>
              </div>
            </div>
          </div>
        </section>

        <!-- Section 2: 配送方式 -->
        <section class="form-section">
          <h3><span class="num">2</span>配送方式</h3>
          <div class="form-body">
            <div class="radio-grid" id="shipGroup">
              <label class="radio-card checked" data-val="home">
                <input type="radio" name="shipping" value="home" checked>
                <div class="check">✓</div>
                <div class="name">🚚 宅配到府</div>
                <div class="desc">1-3 個工作天 · 滿 $499 免運</div>
              </label>
              <label class="radio-card" data-val="cvs">

                <div class="check">✓</div>
                <div class="name">🏪 超商取貨</div>

              </label>
              <label class="radio-card" data-val="store">
                <input type="radio" name="shipping" value="store">

              </label>
            </div>
          </div>
        </section>

        <!-- Section 3: 付款方式 -->

              </label>
            </div>
            <div class="card-fields open" id="cardFields">
              <div class="row" style="grid-template-columns:1fr">

                  <label>卡號</label>

                </div>
              </div>
              <div class="row">
                <div>
                  <label>持卡人</label>
                  <input type="text" id="cardName" placeholder="WANG XIAO MING" autocomplete="cc-name">
                </div>
                <div>

                  <input type="text" id="cardExp" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp">
                </div>

                  <label>末三碼</label>
                  <input type="text" id="cardCvv" placeholder="123" maxlength="3" autocomplete="cc-csc">
                </div>
              </div>
              <div class="card-mock-note">
                ⚠️ 此為 demo 展示,信用卡資料不會送出、不會儲存,任意數字都能通過驗證。
              </div>

        <!-- Section 4: 發票 -->
        <section class="form-section">
          <h3><span class="num">4</span>發票</h3>
          <div class="form-body">
            <div class="radio-grid" id="invGroup">
              <label class="radio-card checked" data-val="cloud">
                <input type="radio" name="invoice" value="cloud" checked>
                <div class="check">✓</div>
                <div class="name">☁️ 雲端發票</div>
                <div class="desc">自動寄送至 Email</div>
              </label>
              <label class="radio-card" data-val="biz">
                <input type="radio" name="invoice" value="biz">
                <div class="check">✓</div>
                <div class="name">🧾 公司戶 (三聯)</div>
                <div class="desc">需提供統編</div>
              </label>
              <label class="radio-card" data-val="donate">
                <input type="radio" name="invoice" value="donate">
                <div class="check">✓</div>
                <div class="name">❤️ 愛心捐贈</div>
                <div class="desc">捐給社福團體</div>
              </label>
            </div>
          </div>
        </section>
      </div>

      <!-- Right: Summary -->
      <aside class="co-summary" id="coSummary"></aside>
    </form>
  `;

  renderSummary();
  wireUp();
}

function renderSummary() {
  const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
  const shipMethod = document.querySelector('input[name="shipping"]:checked')?.value || 'home';
  const shipping = calcShipping(subtotal, shipMethod);
  const discount = calcDiscount(subtotal);
  const total = Math.max(0, subtotal + shipping - discount);
  const totalCoins = items.reduce((s, it) => {
    const e = getEnrichment(it);
    return s + Math.floor(it.price * it.qty * e.coinPct / 100);
  }, 0);
  const totalQty = items.reduce((s, it) => s + it.qty, 0);

  document.getElementById('coSummary').innerHTML = `
    <h3>訂單摘要 <span class="count">${totalQty} 件商品</span></h3>
    <div class="co-items">
      ${items.map(it => `
        <div class="co-item">
          <div class="img"><img src="${it.image}" alt="" loading="lazy"></div>
          <div class="meta">
            <div class="name">${escapeHtml(it.name)}</div>
            <div class="qty">數量 ${it.qty} × $${formatPrice(it.price)}</div>
          </div>
          <div class="price">$${formatPrice(it.price * it.qty)}</div>
        </div>
      `).join('')}
    </div>
    <div class="co-rows">
      <div class="co-row">
        <span>商品總額</span>
        <span class="v">$${formatPrice(subtotal)}</span>
      </div>
      <div class="co-row">
        <span>運費</span>
        <span class="v">${shipping === 0 ? '<span style="color:var(--green)">免運</span>' : '$' + formatPrice(shipping)}</span>
      </div>
      ${discount > 0 ? `
        <div class="co-row discount">
          <span>滿千折抵</span>
          <span class="v">−$${formatPrice(discount)}</span>
        </div>` : ''}
      <div class="co-row" style="font-size:11px">
        <span>下單可得橙幣</span>
        <span class="v" style="color:#c87800">+${totalCoins}</span>
      </div>
      <div class="co-total">
        <span class="label">應付總額</span>
        <span class="v"><small>NT$</small>${formatPrice(total)}</span>
      </div>
    </div>
    <button class="co-confirm" type="submit" form="coForm" id="confirmBtn">
      確認下單 ›
    </button>
    <div class="co-note">
      <strong>📢 Demo 提醒</strong><br>
      點下「確認下單」會建立模擬訂單(編號 #DEMO-XXXX),不會實際扣款。完成後會跳到訂單成功頁,模擬發送 LINE 通知。
    </div>
  `;
}

function wireUp() {
  // Radio cards
  ['shipGroup', 'payGroup', 'invGroup'].forEach(id => {
    const group = document.getElementById(id);
    if (!group) return;
    group.querySelectorAll('.radio-card').forEach(card => {
      card.addEventListener('click', () => {
        group.querySelectorAll('.radio-card').forEach(c => c.classList.remove('checked'));
        card.classList.add('checked');
        card.querySelector('input').checked = true;
        // 切換信用卡欄位
        if (id === 'payGroup') {
          document.getElementById('cardFields').classList.toggle('open', card.dataset.val === 'card');
        }
        if (id === 'shipGroup') renderSummary();
      });
    });
  });

  // 卡號自動加空格
  const cardNum = document.getElementById('cardNum');
  if (cardNum) cardNum.addEventListener('input', () => {
    let v = cardNum.value.replace(/\D/g, '').slice(0, 16);
    cardNum.value = v.replace(/(.{4})/g, '$1 ').trim();
  });
  // 有效期 MM/YY
  const cardExp = document.getElementById('cardExp');
  if (cardExp) cardExp.addEventListener('input', () => {
    let v = cardExp.value.replace(/\D/g, '').slice(0, 4);
    if (v.length >= 3) v = v.slice(0, 2) + '/' + v.slice(2);
    cardExp.value = v;
  });

  // 縣市 → 區
  const districts = {
    '台北市': ['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],
    '新北市': ['板橋區','新莊區','中和區','永和區','土城區','三重區','蘆洲區','汐止區','樹林區','三峽區','淡水區'],
    '桃園市': ['桃園區','中壢區','八德區','龜山區','蘆竹區','楊梅區','大溪區','平鎮區'],
    '台中市': ['中區','東區','南區','西區','北區','西屯區','南屯區','北屯區','豐原區','東勢區'],
    '台南市': ['中西區','東區','南區','北區','安平區','安南區','永康區','歸仁區'],
    '高雄市': ['苓雅區','三民區','左營區','楠梓區','鼓山區','前鎮區','小港區','岡山區'],
  };
  const cityEl = document.getElementById('fCity');
  const distEl = document.getElementById('fDist');
  cityEl.addEventListener('change', () => {
    const list = districts[cityEl.value] || [];
    distEl.innerHTML = '<option value="">區/鄉鎮</option>' +
      list.map(d => `<option>${d}</option>`).join('');
    if (list.length === 0) distEl.innerHTML += '<option>(暫無資料,請填於地址欄)</option>';
  });

  // 表單送出
  document.getElementById('coForm').addEventListener('submit', e => {
    e.preventDefault();
    if (!validateForm()) return;
    submitOrder();
  });
}

function validateForm() {
  let ok = true;
  function check(id, msg, predicate) {
    const el = document.getElementById(id);
    const row = el.closest('.form-row');
    const valid = predicate(el.value.trim());
    row.classList.toggle('has-error', !valid);
    if (!valid) ok = false;
    return valid;
  }
  check('fName', '請填寫收件人姓名', v => v.length >= 2);
  check('fPhone', '請填寫正確的手機號碼', v => /^0\d{8,9}/.test(v.replace(/[-\s]/g, '')));
  check('fAddr', '請完整填寫配送地址', v => v.length >= 4);

  if (!ok) {
    showToast('請檢查紅色標示的欄位');
    document.querySelector('.has-error')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  return ok;
}

function genOrderId() {
  const r = Math.random().toString(36).slice(2, 7).toUpperCase();
  const t = Date.now().toString(36).slice(-3).toUpperCase();
  return `DEMO-${t}${r}`;
}

function submitOrder() {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = '處理中...';

  const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
  const shipMethod = document.querySelector('input[name="shipping"]:checked').value;
  const payMethod = document.querySelector('input[name="payment"]:checked').value;
  const invMethod = document.querySelector('input[name="invoice"]:checked').value;
  const shipping = calcShipping(subtotal, shipMethod);
  const discount = calcDiscount(subtotal);
  const total = Math.max(0, subtotal + shipping - discount);

  const order = {
    id: genOrderId(),
    createdAt: new Date().toISOString(),
    items: items.map(it => ({
      id: it.id,
      name: it.name,
      model: it.model,
      image: it.image,
      price: it.price,
      qty: it.qty,
    })),
    shipping: {
      method: shipMethod,
      methodLabel: { home: '宅配到府', cvs: '超商取貨', store: '門市自取' }[shipMethod],
      name: document.getElementById('fName').value.trim(),
      phone: document.getElementById('fPhone').value.trim(),
      email: document.getElementById('fEmail').value.trim(),
      city: document.getElementById('fCity').value,
      district: document.getElementById('fDist').value,
      address: document.getElementById('fAddr').value.trim(),
      fee: shipping,
    },
    payment: {
      method: payMethod,
      methodLabel: { card: '信用卡', atm: 'ATM 轉帳', cod: '貨到付款' }[payMethod],
    },
    invoice: {
      type: invMethod,
      typeLabel: { cloud: '雲端發票', biz: '公司戶 (三聯)', donate: '愛心捐贈' }[invMethod],
    },
    subtotal, shipping_fee: shipping, discount, total,
  };

  orderStore.save(order);

  // 模擬延遲讓 demo 更真實
  setTimeout(() => {
    cartStore.clear();
    localStorage.removeItem('chengzhu_shop_select_v1');
    location.href = `success.html?order=${encodeURIComponent(order.id)}`;
  }, 800);
}
</script>
