<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品詳情 — 橙築選物</title>
  <link rel="preconnect" href="https://images.weserv.nl">
  <link rel="stylesheet" href="styles.css">
  <style>
    .pd {
      background: #fff; border: 1px solid var(--border);
      padding: 24px;
      display: grid;
      grid-template-columns: minmax(0, 480px) 1fr;
      gap: 32px;
      margin-bottom: 16px;
    }
    .pd-gallery .main {
      aspect-ratio: 1;
      background: #fafafa;
      border: 1px solid var(--border-soft);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .pd-gallery .main img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; padding: 24px;
      transition: transform .3s;
    }
    .pd-gallery .thumbs {
      display: grid; grid-template-columns: repeat(5, 1fr);
      gap: 6px; margin-top: 8px;
    }
    .pd-gallery .thumbs button {
      aspect-ratio: 1;
      background: #fafafa;
      border: 2px solid var(--border-soft);
      cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .pd-gallery .thumbs button.active {
      border-color: var(--pink);
    }
    .pd-gallery .thumbs button img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }

    .pd-info { display: flex; flex-direction: column; min-width: 0; }
    .pd-cat {
      font-size: 12px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      font-weight: 600; margin-bottom: 6px;
    }
    .pd-name {
      font-size: 22px; font-weight: 800;
      color: var(--dark); line-height: 1.35;
      margin-bottom: 8px;
    }
    .pd-model {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px; color: var(--text-faint);
      margin-bottom: 12px;
    }
    .pd-rating {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px dashed var(--border);
    }
    .pd-rating .stars { color: #ffc400; font-size: 16px; letter-spacing: -1px; }
    .pd-rating .num { color: var(--text); font-weight: 700; }
    .pd-rating .sep { color: var(--border); }

    .pd-price-block {
      background: var(--pink-tint);
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 4px;
      display: flex; align-items: baseline; gap: 12px;
      flex-wrap: wrap;
    }
    .pd-price {
      font-size: 36px; font-weight: 900;
      color: var(--red); line-height: 1;
      letter-spacing: -1px; font-variant-numeric: tabular-nums;
    }
    .pd-price small { font-size: 18px; font-weight: 700; margin-right: 2px; }
    .pd-orig {
      font-size: 14px; color: var(--text-faint);
      text-decoration: line-through;
    }
    .pd-discount {
      font-size: 12px; font-weight: 800; color: #fff;
      background: var(--red);
      padding: 4px 8px; border-radius: 2px;
    }
    .pd-coin {
      width: 100%; margin-top: 8px;
      font-size: 12px; color: var(--text-muted);
    }
    .pd-coin b { color: #c87800; font-weight: 700; }

    .pd-tags {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .pd-tag {
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 2px;
    }
    .pd-tag.shipping { color: var(--green); background: var(--green-light); }
    .pd-tag.coin { color: #c87800; background: #fff7e0; }
    .pd-tag.card { color: var(--pink); background: var(--pink-light); }
    .pd-tag.stock { color: var(--text-muted); background: var(--bg-soft); }

    .pd-row {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 0;
      border-bottom: 1px dashed var(--border);
    }
    .pd-row .label {
      width: 64px; flex-shrink: 0;
      font-size: 13px; color: var(--text-muted);
    }
    .qty-stepper {
      display: flex; align-items: center;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .qty-stepper button {
      width: 36px; height: 36px;
      font-size: 18px; font-weight: 700;
      color: var(--text);
      transition: background .15s;
    }
    .qty-stepper button:hover { background: var(--bg-soft); }
    .qty-stepper button:disabled { color: var(--border); cursor: not-allowed; }
    .qty-stepper input {
      width: 56px; height: 36px;
      text-align: center;
      border: none;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      font-size: 14px; font-weight: 700;
      outline: none;
    }
    .stock-info { font-size: 12px; color: var(--text-muted); }
    .stock-info b { color: var(--green); font-weight: 700; }

    .pd-actions {
      display: flex; gap: 8px;
      margin-top: 20px;
    }
    .pd-actions .btn {
      flex: 1; padding: 14px 24px;
      font-size: 15px;
    }

    .pd-promise {
      display: flex; gap: 16px;
      margin-top: 20px; padding: 16px;
      background: var(--bg-soft);
      border-radius: 4px;
      flex-wrap: wrap;
    }
    .pd-promise .promise {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted);
      flex: 1; min-width: 140px;
    }
    .pd-promise .promise .ic {
      font-size: 18px;
    }

    /* === DETAIL TABS === */
    .pd-tabs {
      background: #fff;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .pd-tabs-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .pd-tab {
      flex: 1;
      padding: 14px 20px;
      font-size: 14px; font-weight: 700;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .pd-tab:hover { color: var(--text); }
    .pd-tab.active { color: var(--pink); border-bottom-color: var(--pink); }
    .pd-tab-content { padding: 24px; display: none; }
    .pd-tab-content.active { display: block; }
    .pd-desc h3 {
      font-size: 18px; font-weight: 700;
      margin-bottom: 12px; color: var(--dark);
    }
    .pd-desc p {
      font-size: 14px; line-height: 1.8;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .pd-specs {
      display: grid; grid-template-columns: 120px 1fr;
      gap: 0; border: 1px solid var(--border);
    }
    .pd-specs > div {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-soft);
      font-size: 13px;
    }
    .pd-specs > div:nth-last-child(-n+2) { border-bottom: none; }
    .pd-specs .k { background: var(--bg-soft); color: var(--text-muted); font-weight: 600; }

    .pd-reviews .review {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .pd-reviews .review:last-child { border-bottom: none; }
    .pd-reviews .review .head {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; margin-bottom: 6px;
    }
    .pd-reviews .review .name { font-weight: 700; }
    .pd-reviews .review .stars { color: #ffc400; }
    .pd-reviews .review .date { color: var(--text-faint); margin-left: auto; }
    .pd-reviews .review p { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

    /* === RECOMMENDED === */
    .recommended {
      background: #fff; border: 1px solid var(--border);
      padding: 24px; margin-bottom: 16px;
    }
    .rec-title {
      font-size: 16px; font-weight: 800;
      color: var(--dark); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .rec-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .rec-card {
      border: 1px solid var(--border);
      transition: all .15s;
    }
    .rec-card:hover { border-color: var(--pink); }
    .rec-card .img {
      aspect-ratio: 1; background: #fafafa;
      display: flex; align-items: center; justify-content: center;
    }
    .rec-card img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; padding: 10px;
    }
    .rec-card .body { padding: 8px 10px 10px; }
    .rec-card .name {
      font-size: 12px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 33px;
      margin-bottom: 4px;
    }
    .rec-card .price {
      font-size: 16px; font-weight: 800;
      color: var(--red); font-variant-numeric: tabular-nums;
    }
    .rec-card .price small { font-size: 11px; }

    @media (max-width: 850px) {
      .pd { grid-template-columns: 1fr; padding: 16px; gap: 16px; }
      .pd-name { font-size: 18px; }
      .pd-price { font-size: 30px; }
      .rec-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .pd { padding: 12px; }
      .pd-actions { flex-direction: column-reverse; }
      .pd-tabs-bar { overflow-x: auto; }
      .pd-tab { white-space: nowrap; padding: 12px 16px; }
      .rec-grid { grid-template-columns: repeat(2, 1fr); }
      .pd-specs { grid-template-columns: 100px 1fr; }
    }
  </style>
</head>
<body>

<div class="demo-banner">
  <span class="badge">DEMO</span>
  橙築 LINE 整合電商示範站
  <span class="muted">· 結帳不會實際扣款</span>
</div>

<div class="top-bar">
  <div class="top-bar-inner">
    <a href="#">客服中心</a><span class="sep">|</span>
    <a href="#">訂單查詢</a><span class="sep">|</span>
    <a href="#">會員登入</a><span class="sep">|</span>
    <a href="#">加入會員</a><span class="sep">|</span>
    <a href="/">回橙築主站</a>
  </div>
</div>

<header class="header">
  <div class="header-inner">
    <a class="logo" href="index.html">
      <span class="logo-mark">橙築<span>選物</span></span>
      <span class="logo-sub">SHOP</span>
    </a>
    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="輸入商品名稱、型號或關鍵字">
      <button id="searchBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        搜尋
      </button>
    </div>
    <div class="header-actions">
      <a class="header-btn cart" href="cart.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="label">購物車</span>
        <span class="badge js-cart-count">0</span>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="breadcrumb" id="breadcrumb">
    <a href="index.html">首頁</a>
  </div>

  <div id="productMain"></div>

  <div class="pd-tabs" id="pdTabs">
    <div class="pd-tabs-bar" id="pdTabsBar">
      <button class="pd-tab active" data-tab="desc">商品介紹</button>
      <button class="pd-tab" data-tab="specs">規格</button>
      <button class="pd-tab" data-tab="reviews">客戶評價</button>
    </div>
    <div class="pd-tab-content active" data-tab="desc" id="tabDesc"></div>
    <div class="pd-tab-content" data-tab="specs" id="tabSpecs"></div>
    <div class="pd-tab-content" data-tab="reviews" id="tabReviews"></div>
  </div>

  <section class="recommended">
    <div class="rec-title">🛍️ 你可能也會喜歡</div>
    <div class="rec-grid" id="recGrid"></div>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <div class="footer-brand">橙築<span>選物</span></div>
    <ul class="footer-links">
      <li><a href="/">主站</a></li>
      <li><a href="/linebot/">LINE Bot</a></li>
      <li><a href="/booking/">預約系統</a></li>
      <li><a href="#">客服中心</a></li>
    </ul>
    <div class="footer-copy">© 2026 橙築國際 · 此商城為 demo 展示</div>
  </div>
</footer>

<script src="products.js"></script>
<script src="cart.js"></script>
<script>
const params = new URLSearchParams(location.search);
const productId = params.get('id');
const product = findProduct(productId);

if (!product) {
  document.getElementById('productMain').innerHTML = `
    <div class="empty" style="background:#fff;border:1px solid var(--border);padding:60px 24px;text-align:center">
      <div style="font-size:36px;margin-bottom:10px">😅</div>
      <h3>找不到這個商品</h3>
      <p style="margin-top:6px"><a href="index.html" style="color:var(--pink)">回到商品列表</a></p>
    </div>`;
} else {
  document.title = `${product.name} — 橙築選物`;
  const e = getEnrichment(product);
  const promo = PROMO[product.id];

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML = `
    <a href="index.html">首頁</a>
    <span class="sep">›</span>
    <a href="index.html?cat=${encodeURIComponent(product.category)}">${escapeHtml(product.category)}</a>
    <span class="sep">›</span>
    <span class="current">${escapeHtml(product.name)}</span>
  `;

  // Big image: bump w=400 → 1200
  const bigImg = product.image.replace(/[?&]w=\d+/, m => m[0] + 'w=1200');

  // Tags
  const tags = [];
  if (e.freeShip) tags.push('<span class="pd-tag shipping">🚚 滿 $499 免運</span>');
  if (e.cardPromo) tags.push('<span class="pd-tag card">💳 卡享 6%</span>');
  tags.push(`<span class="pd-tag coin">🪙 橙幣 ${e.coinPct}% 回饋</span>`);
  tags.push(`<span class="pd-tag stock">📦 現貨 ${product.inventory.toLocaleString()} 件</span>`);

  // Price
  const origHtml = e.origPrice
    ? `<span class="pd-orig">原價 $${formatPrice(e.origPrice)}</span><span class="pd-discount">${e.discountPct}% off</span>`
    : '';

  // Promo badge above name
  const promoHtml = promo
    ? `<span class="badge-pill badge-${promo.type}" style="display:inline-block;padding:3px 8px;font-size:11px;font-weight:800;color:#fff;border-radius:2px;background:var(--orange-hot);margin-right:6px">${promo.label}</span>`
    : '';

  document.getElementById('productMain').innerHTML = `
    <div class="pd">
      <div class="pd-gallery">
        <div class="main"><img id="mainImage" src="${bigImg}" alt="${escapeHtml(product.name)}"></div>
        <div class="thumbs">
          <button class="active"><img src="${product.image}" alt=""></button>
          <button><img src="${product.image}" alt=""></button>
          <button><img src="${product.image}" alt=""></button>
        </div>
      </div>
      <div class="pd-info">
        <div class="pd-cat">${escapeHtml(product.category)}</div>
        <h1 class="pd-name">${promoHtml}${escapeHtml(product.name)}</h1>
        <div class="pd-model">型號 ${escapeHtml(product.model)}</div>
        <div class="pd-rating">
          <span class="stars">${renderStars(e.stars)}</span>
          <span class="num">${e.stars}</span>
          <span class="sep">|</span>
          <span>${formatPrice(e.reviews)} 則評價</span>
          <span class="sep">|</span>
          <span>已售出 ${formatPrice(Math.floor(e.reviews * 4.2))} 件</span>
        </div>
        <div class="pd-price-block">
          <div class="pd-price"><small>$</small>${formatPrice(product.price)}</div>
          ${origHtml}
          <div class="pd-coin">下單可得 <b>${Math.floor(product.price * e.coinPct / 100)} 橙幣</b> · 信用卡分期 0 利率</div>
        </div>
        <div class="pd-tags">${tags.join('')}</div>
        <div class="pd-row">
          <div class="label">數量</div>
          <div class="qty-stepper">
            <button id="qtyMinus" type="button">−</button>
            <input type="text" id="qtyInput" value="1" inputmode="numeric">
            <button id="qtyPlus" type="button">+</button>
          </div>
          <div class="stock-info">庫存 <b>${product.inventory.toLocaleString()}</b> 件</div>
        </div>
        <div class="pd-actions">
          <button class="btn btn-ghost" id="addCartBtn" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
            加入購物車
          </button>
          <button class="btn btn-primary" id="buyNowBtn" type="button">
            立即購買
          </button>
        </div>
        <div class="pd-promise">
          <div class="promise"><span class="ic">🚚</span>滿 $499 免運</div>
          <div class="promise"><span class="ic">📦</span>24 小時出貨</div>
          <div class="promise"><span class="ic">↩️</span>7 日鑑賞期</div>
          <div class="promise"><span class="ic">🛡️</span>原廠保固一年</div>
        </div>
      </div>
    </div>
  `;

  // Tab content
  document.getElementById('tabDesc').innerHTML = `
    <div class="pd-desc">
      <h3>${escapeHtml(product.name)}</h3>
      <p>${escapeHtml(product.shortDesc || product.name)}。為居家、辦公、外出多場景設計,操作直覺,功能齊全。</p>
      <h3>產品特色</h3>
      <p>✓ 高品質做工,通過台灣 BSMI / NCC 認證(視商品)</p>
      <p>✓ 簡單易用,開箱即用,適合送禮自用兩相宜</p>
      <p>✓ 原廠保固一年,故障免費維修</p>
      <p>✓ 滿 $499 免運費,24 小時內出貨</p>
      <h3>包裝內容</h3>
      <p>主機 × 1、說明書 × 1、保固卡 × 1(實際內容物以包裝為準)</p>
    </div>
  `;

  document.getElementById('tabSpecs').innerHTML = `
    <div class="pd-specs">
      <div class="k">商品名稱</div><div>${escapeHtml(product.name)}</div>
      <div class="k">型號</div><div>${escapeHtml(product.model)}</div>
      <div class="k">分類</div><div>${escapeHtml(product.category)}</div>
      <div class="k">售價</div><div>NT$ ${formatPrice(product.price)}</div>
      <div class="k">原價</div><div>${e.origPrice ? 'NT$ ' + formatPrice(e.origPrice) : '—'}</div>
      <div class="k">庫存</div><div>${formatPrice(product.inventory)} 件</div>
      <div class="k">產地</div><div>台灣</div>
      <div class="k">保固</div><div>原廠保固一年</div>
      <div class="k">配送</div><div>本島宅配 1-3 個工作天</div>
    </div>
  `;

  // Fake reviews (deterministic)
  const fakeReviews = [
    { name: '陳*華', stars: 5, date: '2026-04-28', text: '收到馬上開箱使用,品質很好,做工也很扎實,推薦!' },
    { name: '林*英', stars: 5, date: '2026-04-22', text: '送貨快,包裝也很完整,跟描述一樣,很滿意。' },
    { name: '王*明', stars: 4, date: '2026-04-15', text: 'CP 值很高,使用上很方便,只是說明書有點簡略。' },
    { name: '李*美', stars: 5, date: '2026-04-08', text: '已經是第二次回購了,真的好用又便宜,會再推薦給朋友。' },
    { name: '張*強', stars: 5, date: '2026-03-30', text: '橙築選物的客服回應很快,有問題都能很快處理,滿意。' },
  ];
  document.getElementById('tabReviews').innerHTML = `
    <div class="pd-reviews">
      ${fakeReviews.map(r => `
        <div class="review">
          <div class="head">
            <span class="name">${r.name}</span>
            <span class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</span>
            <span class="date">${r.date}</span>
          </div>
          <p>${r.text}</p>
        </div>
      `).join('')}
    </div>
  `;

  // Tabs switching
  document.getElementById('pdTabsBar').addEventListener('click', ev => {
    const tab = ev.target.closest('.pd-tab');
    if (!tab) return;
    document.querySelectorAll('.pd-tab').forEach(t => t.classList.toggle('active', t === tab));
    document.querySelectorAll('.pd-tab-content').forEach(c => c.classList.toggle('active', c.dataset.tab === tab.dataset.tab));
  });

  // Qty stepper
  const qtyInput = document.getElementById('qtyInput');
  const minus = document.getElementById('qtyMinus');
  const plus = document.getElementById('qtyPlus');
  function setQty(n) {
    n = Math.max(1, Math.min(99, parseInt(n) || 1));
    qtyInput.value = n;
    minus.disabled = n <= 1;
  }
  minus.addEventListener('click', () => setQty(parseInt(qtyInput.value) - 1));
  plus.addEventListener('click', () => setQty(parseInt(qtyInput.value) + 1));
  qtyInput.addEventListener('input', () => setQty(qtyInput.value));
  qtyInput.addEventListener('blur', () => setQty(qtyInput.value));
  setQty(1);

  // Add to cart / buy now
  document.getElementById('addCartBtn').addEventListener('click', () => {
    cartStore.add(productId, parseInt(qtyInput.value));
    showToast(`已加入購物車 · ${product.name} × ${qtyInput.value}`);
  });
  document.getElementById('buyNowBtn').addEventListener('click', () => {
    cartStore.add(productId, parseInt(qtyInput.value));
    location.href = 'cart.html';
  });

  // Recommended (same category, fallback to random)
  let rec = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id);
  if (rec.length < 4) {
    const others = PRODUCTS.filter(p => p.id !== product.id && !rec.includes(p));
    rec = rec.concat(others.slice(0, 4 - rec.length));
  }
  rec = rec.slice(0, 4);
  document.getElementById('recGrid').innerHTML = rec.map(p => `
    <a class="rec-card" href="product.html?id=${p.id}">
      <div class="img"><img src="${p.image}" alt="${escapeHtml(p.name)}" loading="lazy"></div>
      <div class="body">
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="price"><small>$</small>${formatPrice(p.price)}</div>
      </div>
    </a>
  `).join('');
}
</script>

</body>
</html>
